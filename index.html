<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; img-src 'none'; connect-src 'none';">
  <title>ひらがな れんしゅうシート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 入力画面 -->
  <div id="input-screen">
    <header>
      <h1>ひらがな<br>れんしゅうシート</h1>
      <p class="subtitle">れんしゅうしたい ことばを いれてね</p>
    </header>
    <main>
      <div class="name-field">
        <label for="user-name">おなまえ</label>
        <input type="text" id="user-name" placeholder="れい: たろう" autocomplete="off">
      </div>
      <textarea id="word-input" rows="4" placeholder="れい: さくら、おかあさん&#10;（ことばごとに かいぎょう か 、で わけてね）"></textarea>
      <div id="error-message" class="hidden"></div>
      <button id="generate-btn">れんしゅうシートを つくる！</button>

      <!-- 履歴 -->
      <div id="history-section" class="hidden">
        <h2 class="history-title">さいきんの れんしゅう</h2>
        <ul id="history-list"></ul>
      </div>
    </main>
  </div>

  <!-- 練習シート画面 -->
  <div id="practice-sheet" class="hidden">
    <div class="sheet-controls no-print">
      <button id="back-btn">もどる</button>
      <button id="print-btn">いんさつする</button>
    </div>
    <div id="print-date" class="print-only"></div>
    <div id="sheet-content"></div>
  </div>

  <!-- フッター -->
  <footer class="site-footer no-print">
    <p>&copy; 2026 newboldaction. All rights reserved.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
